services:
  db:
    image: postgres:16-alpine
    container_name: camera_store_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-camera_store}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera_store_api
    environment:
      PORT: 3000
      # NOTE: For easiest first boot we use development so TypeORM auto-creates tables.
      # If you prefer migrations-only, we can switch this later.
      NODE_ENV: ${NODE_ENV:-development}

      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-camera_store}

      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}

      # Comma-separated list, e.g. "https://your-frontend.vercel.app,https://yourdomain.com"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,https://aster-camera-online-store.vercel.app}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:

